<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IEG-M Dashboard — Olímpia/SP</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.15.4/umd/Recharts.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; background: #f1f5f9; color: #1e293b; }
    a { text-decoration: none; color: inherit; }

    /* Layout */
    .app { display: flex; min-height: 100vh; }
    .sidebar {
      width: 256px; min-width: 256px; background: #003366; color: #e2e8f0;
      display: flex; flex-direction: column; position: fixed; top: 0; left: 0;
      height: 100vh; z-index: 100; overflow-y: auto;
    }
    .sidebar-header {
      padding: 20px 16px 16px; border-bottom: 1px solid rgba(255,255,255,0.12);
    }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; }
    .sidebar-logo-icon {
      width: 40px; height: 40px; background: #ffb800; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .sidebar-logo-text { font-size: 13px; font-weight: 700; color: #fff; line-height: 1.3; }
    .sidebar-logo-sub { font-size: 10px; color: #93c5fd; font-weight: 400; }
    .sidebar-nav { padding: 12px 10px; flex: 1; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 10px; cursor: pointer;
      margin-bottom: 4px; transition: all .15s;
      border: none; background: none; width: 100%; text-align: left;
    }
    .nav-item:hover { background: rgba(255,255,255,0.08); }
    .nav-item.active { background: #ffb800; color: #003366; }
    .nav-item .nav-icon { font-size: 16px; flex-shrink: 0; }
    .nav-item .nav-label { font-size: 12px; font-weight: 600; }
    .nav-item .nav-sub { font-size: 10px; opacity: .7; margin-top: 1px; }
    .sidebar-footer {
      padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 10px; color: #93c5fd;
    }

    .main { margin-left: 256px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .top-bar {
      background: #fff; border-bottom: 1px solid #e2e8f0;
      padding: 12px 24px; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50; box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .top-bar-title { font-size: 14px; font-weight: 700; color: #003366; }
    .top-bar-badge {
      font-size: 10px; font-weight: 700; background: #ffb800;
      color: #003366; padding: 3px 10px; border-radius: 99px;
    }
    .content { padding: 24px; flex: 1; }

    /* Cards & components */
    .card {
      background: #fff; border-radius: 12px; border: 1px solid #e2e8f0;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
    }
    .card-navy-border { border-left: 8px solid #003366; }
    .card-red-border { border-left: 8px solid #ef4444; }
    .card-green-border { border-left: 8px solid #16a34a; }
    .card-amber-border { border-left: 8px solid #f59e0b; }
    .card-blue-border { border-left: 8px solid #3b82f6; }
    .card-p { padding: 20px; }

    .section-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: #003366;
      border-bottom: 2px solid #ffb800; padding-bottom: 8px; margin-bottom: 4px;
    }
    .section-sub { font-size: 11px; color: #64748b; margin-bottom: 16px; }

    .page-header {
      background: #003366; border-left: 8px solid #ffb800;
      border-radius: 12px; padding: 16px 20px;
      display: flex; align-items: center; gap: 14px; margin-bottom: 20px;
      box-shadow: 0 4px 12px rgba(0,51,102,.2);
    }
    .page-header-icon { font-size: 24px; color: #ffb800; flex-shrink: 0; }
    .page-header-badge { font-size: 9px; font-weight: 700; letter-spacing: .1em; color: #93c5fd; text-transform: uppercase; }
    .page-header-title { font-size: 15px; font-weight: 700; color: #fff; }
    .page-header-sub { font-size: 11px; color: #bfdbfe; font-style: italic; }

    /* Grade badges */
    .grade-badge {
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 8px; font-weight: 700; font-family: 'Poppins', sans-serif;
      letter-spacing: .04em; border-width: 2px; border-style: solid;
    }
    .grade-sm { font-size: 11px; padding: 2px 8px; }
    .grade-md { font-size: 13px; padding: 4px 10px; }
    .grade-xl { font-size: 22px; padding: 6px 14px; }

    /* Grid utilities */
    .grid { display: grid; }
    .grid-2 { grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .grid-4 { grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .grid-5 { grid-template-columns: repeat(5, 1fr); gap: 12px; }
    .grid-35 { grid-template-columns: 3fr 2fr; gap: 16px; }
    .grid-23 { grid-template-columns: 2fr 1fr; gap: 16px; }
    .space-y > * + * { margin-top: 20px; }

    /* Flex */
    .flex { display: flex; }
    .items-center { align-items: center; }
    .items-start { align-items: flex-start; }
    .justify-between { justify-content: space-between; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .gap-4 { gap: 16px; }
    .flex-1 { flex: 1; }
    .flex-wrap { flex-wrap: wrap; }

    /* Tables */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .table-head-navy { background: #003366; color: #fff; }
    .table-head-navy th {
      padding: 10px 16px; text-align: left;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
    }
    .table-head-navy th.center { text-align: center; }
    tbody tr:nth-child(even) { background: #f8fafc; }
    tbody tr { border-top: 1px solid #e2e8f0; }
    td { padding: 10px 16px; }
    td.center { text-align: center; }

    /* Pills */
    .pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 600;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

    /* Alert/info boxes */
    .alert-box { border-radius: 12px; padding: 14px 16px; display: flex; align-items: flex-start; gap: 12px; }
    .alert-icon { font-size: 18px; margin-top: 1px; }
    .alert-title { font-size: 13px; font-weight: 600; }
    .alert-text { font-size: 12px; margin-top: 3px; }
    .alert-amber { background: #fffbeb; border: 1px solid #fde68a; }
    .alert-amber .alert-title { color: #92400e; }
    .alert-amber .alert-text { color: #b45309; }
    .alert-blue { background: #eff6ff; border: 1px solid #bfdbfe; }
    .alert-blue .alert-title { color: #1e40af; }
    .alert-blue .alert-text { color: #1d4ed8; }
    .alert-green { background: #f0fdf4; border: 1px solid #bbf7d0; }
    .alert-green .alert-title { color: #166534; }
    .alert-green .alert-text { color: #15803d; }
    .alert-red { background: #fef2f2; border: 1px solid #fecaca; }
    .alert-red .alert-title { color: #991b1b; }
    .alert-red .alert-text { color: #b91c1c; }

    /* Progress bar */
    .progress-bg { background: #e2e8f0; border-radius: 99px; height: 20px; overflow: hidden; flex: 1; }
    .progress-fill { height: 100%; border-radius: 99px; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; transition: width .7s; }
    .progress-fill span { color: #fff; font-size: 11px; font-weight: 700; }

    /* Heatmap cell */
    .heat-cell {
      display: inline-flex; align-items: center; justify-content: center;
      width: 48px; height: 32px; border-radius: 8px; font-weight: 700;
      font-size: 13px; color: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }

    /* KPI number */
    .kpi-num { font-size: 20px; font-weight: 700; line-height: 1.2; }

    /* Semáforo item */
    .sem-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; border-radius: 12px; border-width: 1px; border-style: solid;
      margin-bottom: 8px;
    }

    /* Priority row */
    .priority-circle {
      width: 32px; height: 32px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; font-weight: 700;
      font-size: 13px; color: #fff; flex-shrink: 0;
    }
    .impact-badge {
      padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 600;
      border-width: 1px; border-style: solid;
    }

    /* Square dots */
    .sq { width: 14px; height: 14px; border-radius: 3px; display: inline-block; }
    .sq-sm { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }

    /* Responsive */
    @media (max-width: 900px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
      .grid-5 { grid-template-columns: repeat(2, 1fr); }
      .grid-4 { grid-template-columns: repeat(2, 1fr); }
      .grid-35, .grid-23, .grid-3 { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .grid-2 { grid-template-columns: 1fr; }
    }

    /* Objective gradient banner */
    .obj-banner {
      background: linear-gradient(135deg, #1e3a5f 0%, #1d4ed8 100%);
      border-radius: 12px; padding: 20px; color: #fff;
      box-shadow: 0 4px 12px rgba(30,58,95,.3);
    }
    .obj-banner-label { font-size: 11px; font-weight: 500; opacity: .75; margin-bottom: 4px; }
    .obj-banner-title { font-size: 22px; font-weight: 800; }
    .obj-banner-sub { font-size: 12px; opacity: .8; margin-top: 6px; }

    /* Meta bar squares */
    .meta-sq {
      flex: 1; height: 24px; border-radius: 3px; border-width: 2px; border-style: solid;
      transition: all .3s;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script>
(function(){
  const { useState, useEffect } = React;
  const {
    LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip,
    ReferenceLine, ResponsiveContainer, Cell, Legend,
    RadarChart, Radar, PolarGrid, PolarAngleAxis, PolarRadiusAxis,
    LabelList
  } = Recharts;

  // ─── DATA ──────────────────────────────────────────────────────────────────
  const GRADE_VALUE = { A: 5, 'B+': 4, B: 3, 'C+': 2, C: 1 };
  const GRADE_LABEL = { 5: 'A', 4: 'B+', 3: 'B', 2: 'C+', 1: 'C' };
  const GRADE_COLOR = { A: '#16a34a', 'B+': '#22c55e', B: '#f59e0b', 'C+': '#f97316', C: '#ef4444' };

  const IEGM_EVOLUTION = [
    { ano: 2015, nota: 'B' }, { ano: 2016, nota: 'B+' }, { ano: 2017, nota: 'B+' },
    { ano: 2018, nota: 'B+' }, { ano: 2019, nota: 'B' }, { ano: 2020, nota: 'B' },
    { ano: 2021, nota: 'B' }, { ano: 2022, nota: 'B' }, { ano: 2023, nota: 'B' },
    { ano: 2024, nota: 'B' }, { ano: 2025, nota: 'B' },
  ];

  const NOTE_DISTRIBUTION = [
    { nota: 'A', quantidade: 11 }, { nota: 'B+', quantidade: 17 },
    { nota: 'B', quantidade: 39 }, { nota: 'C+', quantidade: 11 }, { nota: 'C', quantidade: 4 },
  ];

  const INDICATORS = ['i-Plan', 'i-Fiscal', 'i-Educ', 'i-Saúde', 'i-Amb', 'i-Cidade', 'i-Gov TI'];

  const INDICATORS_EVOLUTION = [
    { ano: 2016, 'i-Plan': 'B+', 'i-Fiscal': 'B',  'i-Educ': 'B+', 'i-Saúde': 'A',  'i-Amb': 'A',  'i-Cidade': 'A',  'i-Gov TI': 'B'  },
    { ano: 2017, 'i-Plan': 'A',  'i-Fiscal': 'B',  'i-Educ': 'B+', 'i-Saúde': 'B+', 'i-Amb': 'B+', 'i-Cidade': 'A',  'i-Gov TI': 'B+' },
    { ano: 2018, 'i-Plan': 'B+', 'i-Fiscal': 'B+', 'i-Educ': 'C+', 'i-Saúde': 'B+', 'i-Amb': 'B+', 'i-Cidade': 'B+', 'i-Gov TI': 'B'  },
    { ano: 2025, 'i-Plan': 'C+', 'i-Fiscal': 'B+', 'i-Educ': 'B',  'i-Saúde': 'C+', 'i-Amb': 'C',  'i-Cidade': 'B',  'i-Gov TI': 'B'  },
  ];

  const HIGH_GRADE_COUNT = [
    { ano: 2016, quantidade: 5 }, { ano: 2017, quantidade: 5 },
    { ano: 2018, quantidade: 5 }, { ano: 2025, quantidade: 1 },
  ];

  const LOSS_RANKING = [
    { indicador: 'i-Plan',   melhor: 'A',  atual: 'C+', perda: 3 },
    { indicador: 'i-Saúde',  melhor: 'A',  atual: 'C+', perda: 3 },
    { indicador: 'i-Amb',    melhor: 'A',  atual: 'C',  perda: 4 },
    { indicador: 'i-Cidade', melhor: 'A',  atual: 'B',  perda: 2 },
    { indicador: 'i-Educ',   melhor: 'B+', atual: 'B',  perda: 1 },
    { indicador: 'i-Fiscal', melhor: 'B+', atual: 'B+', perda: 0 },
    { indicador: 'i-Gov TI', melhor: 'B+', atual: 'B',  perda: 1 },
  ];

  const SEMAFORO = [
    { indicador: 'i-Plan',   situacao: 'Crítico',  cor: 'red'    },
    { indicador: 'i-Amb',    situacao: 'Crítico',  cor: 'red'    },
    { indicador: 'i-Saúde',  situacao: 'Atenção',  cor: 'orange' },
    { indicador: 'i-Cidade', situacao: 'Moderado', cor: 'yellow' },
    { indicador: 'i-Educ',   situacao: 'Moderado', cor: 'yellow' },
    { indicador: 'i-Fiscal', situacao: 'Bom',      cor: 'green'  },
    { indicador: 'i-Gov TI', situacao: 'Estável',  cor: 'green'  },
  ];

  const NOTAS_2025 = { 'i-Plan': 'C+', 'i-Fiscal': 'B+', 'i-Educ': 'B', 'i-Saúde': 'C+', 'i-Amb': 'C', 'i-Cidade': 'B', 'i-Gov TI': 'B' };
  const PROJECAO_2026 = { 'i-Plan': 'B', 'i-Fiscal': 'B+', 'i-Educ': 'B', 'i-Saúde': 'B', 'i-Amb': 'C+', 'i-Cidade': 'B', 'i-Gov TI': 'B+' };
  const PRIORITY_MATRIX = [
    { indicador: 'i-Plan',   impacto: 'Muito Alto', prioridade: 1, notaAtual: 'C+', meta: 'B+' },
    { indicador: 'i-Amb',    impacto: 'Alto',       prioridade: 2, notaAtual: 'C',  meta: 'B+' },
    { indicador: 'i-Saúde',  impacto: 'Médio',      prioridade: 3, notaAtual: 'C+', meta: 'B+' },
    { indicador: 'i-Cidade', impacto: 'Médio',      prioridade: 4, notaAtual: 'B',  meta: 'B+' },
    { indicador: 'i-Educ',   impacto: 'Médio',      prioridade: 5, notaAtual: 'B',  meta: 'B+' },
    { indicador: 'i-Gov TI', impacto: 'Baixo',      prioridade: 6, notaAtual: 'B',  meta: 'B+' },
    { indicador: 'i-Fiscal', impacto: 'Baixo',      prioridade: 7, notaAtual: 'B+', meta: 'A'  },
  ];

  // ─── SHARED COMPONENTS ─────────────────────────────────────────────────────
  function GradeBadge({ grade, size = 'md' }) {
    const color = GRADE_COLOR[grade] || '#6b7280';
    const cls = size === 'xl' ? 'grade-xl' : size === 'sm' ? 'grade-sm' : 'grade-md';
    return React.createElement('span', {
      className: `grade-badge ${cls}`,
      style: { backgroundColor: color + '22', color, borderColor: color + '88' }
    }, grade);
  }

  function PageHeader({ icon, title, subtitle, badge }) {
    return React.createElement('div', { className: 'page-header' },
      React.createElement('div', { className: 'page-header-icon' }, icon),
      React.createElement('div', null,
        badge && React.createElement('p', { className: 'page-header-badge' }, badge),
        React.createElement('p', { className: 'page-header-title' }, title),
        subtitle && React.createElement('p', { className: 'page-header-sub' }, subtitle)
      )
    );
  }

  const tickMap = { 5: 'A', 4: 'B+', 3: 'B', 2: 'C+', 1: 'C' };

  // ─── PAGE 1: VISÃO EXECUTIVA ────────────────────────────────────────────────
  function VisaoExecutiva() {
    const lineData = IEGM_EVOLUTION.map(d => ({ ano: d.ano, valor: GRADE_VALUE[d.nota], nota: d.nota }));

    const CustomDot = (props) => {
      const { cx, cy, payload } = props;
      return React.createElement('circle', { cx, cy, r: 5, fill: payload.nota === 'B+' ? '#22c55e' : '#f59e0b', stroke: 'white', strokeWidth: 2 });
    };

    const TipLine = ({ active, payload, label }) => {
      if (!active || !payload?.length) return null;
      const nota = payload[0]?.payload?.nota;
      return React.createElement('div', { style: { background: '#fff', border: '1px solid #e2e8f0', borderRadius: 8, padding: '8px 12px', fontSize: 12, boxShadow: '0 4px 12px rgba(0,0,0,.1)' } },
        React.createElement('p', { style: { fontWeight: 700 } }, label),
        React.createElement('p', { style: { color: GRADE_COLOR[nota], fontWeight: 600 } }, 'IEG-M: ' + nota)
      );
    };
    const TipBar = ({ active, payload, label }) => {
      if (!active || !payload?.length) return null;
      return React.createElement('div', { style: { background: '#fff', border: '1px solid #e2e8f0', borderRadius: 8, padding: '8px 12px', fontSize: 12 } },
        React.createElement('p', { style: { fontWeight: 700 } }, 'Nota ' + label),
        React.createElement('p', null, payload[0].value + ' ocorrências')
      );
    };

    const kpis = [
      { label: 'IEG-M 2025', value: 'B', sub: 'Resultado atual', isGrade: true },
      { label: 'Melhor Resultado Hist.', value: 'B+', sub: 'Período 2016–2018', isGrade: true },
      { label: 'Anos Consecutivos em B', value: '7', sub: '2019 a 2025', isGrade: false },
      { label: 'Melhor Indicador Hist.', value: 'i-Cidade', sub: 'Atingiu nota A', isGrade: false },
      { label: 'Principal Gargalo Atual', value: 'i-Plan', sub: 'Caiu de A para C+', isGrade: false, alert: true },
    ];

    return React.createElement('div', { className: 'space-y' },
      React.createElement(PageHeader, { icon: '📊', title: 'Visão Executiva', subtitle: 'Diagnóstico geral do IEG-M de Olímpia — onde estamos em 2025', badge: 'Página 1 de 6' }),

      // KPIs
      React.createElement('div', { className: 'grid grid-5' },
        kpis.map(c => React.createElement('div', {
          key: c.label,
          className: `card card-p ${c.alert ? 'card-red-border' : 'card-navy-border'}`,
          style: c.alert ? { background: '#fef2f2' } : {}
        },
          React.createElement('p', { style: { fontSize: 11, color: '#64748b', marginBottom: 6 } }, c.label),
          c.isGrade
            ? React.createElement(GradeBadge, { grade: c.value, size: 'xl' })
            : React.createElement('p', { className: 'kpi-num', style: { color: c.alert ? '#ef4444' : '#1e293b' } }, c.value),
          React.createElement('p', { style: { fontSize: 11, color: '#64748b', marginTop: 6 } }, c.sub)
        ))
      ),

      // Charts row
      React.createElement('div', { className: 'grid grid-23' },
        // Line chart
        React.createElement('div', { className: 'card card-p' },
          React.createElement('div', { className: 'flex justify-between items-start', style: { marginBottom: 12 } },
            React.createElement('div', null,
              React.createElement('p', { className: 'section-title' }, 'Evolução do IEG-M'),
              React.createElement('p', { className: 'section-sub' }, '2015 – 2025')
            ),
            React.createElement('div', { className: 'flex gap-3', style: { fontSize: 11 } },
              React.createElement('span', { className: 'flex items-center gap-2' },
                React.createElement('span', { style: { width: 10, height: 10, borderRadius: '50%', background: '#22c55e', display: 'inline-block' } }),
                'B+'
              ),
              React.createElement('span', { className: 'flex items-center gap-2' },
                React.createElement('span', { style: { width: 10, height: 10, borderRadius: '50%', background: '#f59e0b', display: 'inline-block' } }),
                'B'
              )
            )
          ),
          React.createElement(ResponsiveContainer, { width: '100%', height: 220 },
            React.createElement(LineChart, { data: lineData, margin: { top: 8, right: 12, left: -10, bottom: 0 } },
              React.createElement(CartesianGrid, { strokeDasharray: '3 3', stroke: '#f1f5f9' }),
              React.createElement(XAxis, { dataKey: 'ano', tick: { fontSize: 11 } }),
              React.createElement(YAxis, { domain: [1, 5], tickFormatter: v => tickMap[v] || '', ticks: [1,2,3,4,5], tick: { fontSize: 11 } }),
              React.createElement(Tooltip, { content: React.createElement(TipLine) }),
              React.createElement(ReferenceLine, { y: 4, stroke: '#22c55e', strokeDasharray: '4 3', strokeWidth: 1.5, label: { value: 'B+', position: 'right', fontSize: 10, fill: '#22c55e' } }),
              React.createElement(Line, { type: 'monotone', dataKey: 'valor', stroke: '#1e40af', strokeWidth: 2.5, dot: React.createElement(CustomDot), activeDot: { r: 7 } })
            )
          ),
          React.createElement('p', { style: { fontSize: 11, color: '#64748b', marginTop: 10, fontStyle: 'italic' } },
            '🟢 Período B+: 2016–2018 · 🟡 Período B: 2015, 2019–2025'
          )
        ),
        // Bar chart
        React.createElement('div', { className: 'card card-p' },
          React.createElement('p', { className: 'section-title' }, 'Distribuição Histórica das Notas'),
          React.createElement('p', { className: 'section-sub' }, 'Total de ocorrências por conceito'),
